<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivora AI — Virtual Office</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span class="logo">🏢 Nivora AI</span>
      <span class="tagline">Virtual Office</span>
    </div>
    <div class="header-stats" id="headerStats">
      <span class="stat"><span class="dot green"></span><span id="idleCount">0</span> Idle</span>
      <span class="stat"><span class="dot yellow pulse"></span><span id="workingCount">0</span> Working</span>
      <span class="stat">✅ <span id="doneCount">0</span> Done</span>
    </div>
  </header>

  <!-- Office Scene -->
  <div id="office">
    <img id="officeBg" src="assets/office-pixel-v1.png" alt="Office">

    <!-- Agent Labels (positioned over characters) -->
    <div id="agentLabels"></div>

    <!-- Info Cards -->
    <div id="infoCards"></div>
  </div>

  <!-- Task Board Toggle -->
  <button id="taskBoardBtn" title="Task Board">📋</button>

  <!-- Task Board Panel -->
  <div id="taskBoard" class="hidden">
    <div class="panel-header">
      <span>📋 Task Board</span>
      <button onclick="toggleTaskBoard()">✕</button>
    </div>
    <div id="taskList"></div>
  </div>

  <!-- Overlay backdrop for info cards -->
  <div id="backdrop" class="hidden" onclick="closeAllCards()"></div>

  <script src="js/app.js"></script>
</body>
</html>
