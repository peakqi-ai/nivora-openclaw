<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nivora AI — Virtual Office</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">N</div>
        <div class="logo-text">
          <h1>Nivora AI</h1>
          <span>Virtual Office — AI-Powered Company</span>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat">
          <div class="stat-value" id="stat-members">0</div>
          <div class="stat-label">成員</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-active">0</div>
          <div class="stat-label">執行中</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-tasks">0</div>
          <div class="stat-label">待辦任務</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-completed">0</div>
          <div class="stat-label">已完成</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="clock">--:--:--</div>
          <div class="stat-label">台北時間</div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Isometric Office Scene -->
    <div class="office-section">
      <div class="section-title">
        辦公室實況
        <span id="admin-controls" style="display:none;margin-left:auto;gap:0.5rem;">
          <button class="btn btn-ghost" onclick="resetLocal()" style="font-size:0.75rem;">🔄 重置</button>
        </span>
      </div>

      <div class="iso-viewport" id="iso-viewport">
        <!-- Isometric 3D scene -->
        <div class="iso-scene" id="iso-scene">

          <!-- Floor grid overlay -->
          <div class="iso-floor-grid"></div>

          <!-- Wall screen (back wall) -->
          <div class="iso-wall-screen" id="wall-screen">
            <div class="screen-content">
              <div class="screen-header">📊 TASK BOARD</div>
              <div class="screen-stats" id="screen-stats"></div>
            </div>
            <div class="screen-glow"></div>
          </div>

          <!-- Meeting table (center) -->
          <div class="iso-meeting-table">
            <div class="meeting-table-top"></div>
            <div class="meeting-table-front"></div>
            <div class="meeting-table-right"></div>
            <div class="meeting-label">MEETING</div>
          </div>

          <!-- Agent workstations (rendered by JS) -->
          <div id="workstations-container"></div>

        </div>

        <!-- Info card overlay (click on agent) -->
        <div class="agent-info-card" id="agent-info-card" style="display:none;">
          <button class="info-card-close" onclick="closeInfoCard()">✕</button>
          <div class="info-card-header">
            <div class="info-card-avatar" id="ic-avatar"></div>
            <div>
              <div class="info-card-name" id="ic-name"></div>
              <div class="info-card-role" id="ic-role"></div>
            </div>
          </div>
          <div class="info-card-status" id="ic-status"></div>
          <div class="info-card-task" id="ic-task"></div>
          <div class="info-card-skills" id="ic-skills"></div>
          <div class="info-card-stats" id="ic-stats"></div>
          <div id="ic-admin-controls" style="display:none;margin-top:0.75rem;gap:0.5rem;flex-wrap:wrap;">
            <div style="font-size:0.7rem;color:var(--text-muted);width:100%;margin-bottom:0.25rem;">狀態：</div>
            <button class="status-btn" onclick="setAgentStatus(currentAgentId,'idle')">🟢 待機</button>
            <button class="status-btn" onclick="setAgentStatus(currentAgentId,'working')">🟡 工作中</button>
            <button class="status-btn" onclick="setAgentStatus(currentAgentId,'busy')">🔴 忙碌</button>
            <input class="task-input" id="ic-task-input" placeholder="目前任務..." onchange="setAgentTask(currentAgentId, this.value)" />
          </div>
        </div>
      </div>

      <!-- Mobile 2D fallback -->
      <div class="agents-grid-mobile" id="agents-grid-mobile"></div>
    </div>

    <!-- Add Task (admin only) -->
    <div id="add-task-section" style="display:none;">
      <div class="section-title">新增任務</div>
      <div class="add-task-bar" id="add-task-bar"></div>
    </div>

    <!-- Task Board -->
    <div class="section-title" style="margin-top:1rem;">任務看板</div>
    <div class="task-board" id="task-board"></div>

  </main>

  <footer class="footer">
    Nivora AI © 2026 — Built by AI, for business.
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
