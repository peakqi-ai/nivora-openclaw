<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivora AI — Virtual Office</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <span class="logo">🏢 Nivora AI</span>
      <span class="tagline">Virtual Office</span>
    </div>
    <div class="header-right">
      <div class="header-stats" id="headerStats">
        <span class="stat"><span class="dot green"></span><span id="idleCount">0</span> Idle</span>
        <span class="stat"><span class="dot yellow pulse"></span><span id="workingCount">0</span> Working</span>
        <span class="stat">✅ <span id="doneCount">0</span> Done</span>
      </div>
      <a href="https://printforge-flax.vercel.app/" target="_blank" class="printforge-link">🖨️ PrintForge</a>
    </div>
  </header>

  <!-- Office Scene -->
  <section id="officeSection">
    <div id="office">
      <img id="officeBg" src="assets/office-pixel-v1.png" alt="Office">
      <!-- Agent Labels (positioned over characters) -->
      <div id="agentLabels"></div>
      <!-- Info Cards -->
      <div id="infoCards"></div>
    </div>
  </section>

  <!-- Task Board (inline, below scene) -->
  <section id="taskBoardSection">
    <h2 class="board-title">📋 Task Board</h2>
    <div id="taskColumns">
      <div class="task-col" id="col-todo">
        <div class="col-header todo-header">📌 待辦</div>
        <div class="col-body" id="list-todo"></div>
      </div>
      <div class="task-col" id="col-working">
        <div class="col-header working-header">🔨 進行中</div>
        <div class="col-body" id="list-working"></div>
      </div>
      <div class="task-col" id="col-done">
        <div class="col-header done-header">✅ 已完成</div>
        <div class="col-body" id="list-done"></div>
      </div>
    </div>
  </section>

  <!-- Overlay backdrop for info cards -->
  <div id="backdrop" class="hidden" onclick="closeAllCards()"></div>

  <script src="js/app.js"></script>
</body>
</html>
